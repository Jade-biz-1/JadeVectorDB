services:
  jadevectordb:
    build:
      context: .
      dockerfile: Dockerfile
    image: jadevectordb/jadevectordb:latest
    container_name: jadevectordb
    ports:
      - "8081:8080"
    environment:
      - JADE_DB_PORT=8080
      - JADE_DB_LOG_LEVEL=INFO
      - JADE_DB_DATA_DIR=/data
      - JADE_DB_CONFIG_DIR=/config
      - JADEVECTORDB_ENV=development
    volumes:
      - jadevectordb_data:/data
      - jadevectordb_config:/config
    networks:
      - jadevectordb_network
    restart: unless-stopped
    
    # Health check using HTTP endpoint (T11.6.1 implementation)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # Security options
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    
    # Graceful shutdown - wait 30s for SIGTERM before SIGKILL
    stop_grace_period: 30s

  jadevectordb-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: jadevectordb/ui:local
    container_name: jadevectordb-ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://jadevectordb:8080
    networks:
      - jadevectordb_network
    depends_on:
      - jadevectordb
    restart: unless-stopped

  # ── Ollama (LLM + embeddings for EnterpriseRAG) ─────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve &
       sleep 5 &&
       ollama pull ${OLLAMA_LLM_MODEL:-llama3.2:3b} &&
       ollama pull ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text} &&
       wait"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      - jadevectordb_network
    # Uncomment for GPU support (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── EnterpriseRAG Backend ────────────────────────────────────
  rag-backend:
    build:
      context: ./EnterpriseRAG
      dockerfile: Dockerfile.backend
    image: enterpriserag-backend:latest
    container_name: rag-backend
    restart: unless-stopped
    ports:
      - "${RAG_BACKEND_PORT:-8000}:8000"
    volumes:
      - rag_data:/app/data
      - rag_uploads:/app/uploads
    environment:
      MODE: ${MODE:-mock}
      DEBUG: ${DEBUG:-false}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      FRONTEND_URL: http://localhost:${RAG_FRONTEND_PORT:-3002}
      JADEVECTORDB_URL: http://jadevectordb:8080
      JADEVECTORDB_API_KEY: ${JADEVECTORDB_API_KEY:-}
      JADEVECTORDB_DATABASE_ID: ${JADEVECTORDB_DATABASE_ID:-maintenance_docs}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-llama3.2:3b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      CHUNK_SIZE: ${CHUNK_SIZE:-512}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-50}
      TOP_K: ${TOP_K:-5}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      RAG_API_KEY: ${RAG_API_KEY:-}
      EMBEDDING_TIMEOUT: ${EMBEDDING_TIMEOUT:-30}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-60}
      SEARCH_TIMEOUT: ${SEARCH_TIMEOUT:-10}
      METADATA_DB_PATH: /app/data/rag_metadata.db
      UPLOAD_DIR: /app/uploads
    depends_on:
      jadevectordb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 20s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - jadevectordb_network

  # ── EnterpriseRAG Frontend ───────────────────────────────────
  rag-frontend:
    build:
      context: ./EnterpriseRAG
      dockerfile: Dockerfile.frontend
    image: enterpriserag-frontend:latest
    container_name: rag-frontend
    restart: unless-stopped
    ports:
      - "${RAG_FRONTEND_PORT:-3002}:80"
    depends_on:
      rag-backend:
        condition: service_healthy
    networks:
      - jadevectordb_network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - jadevectordb_network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - jadevectordb_network
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  jadevectordb_data:
    driver: local
  jadevectordb_config:
    driver: local
  ollama_data:
    driver: local
  rag_data:
    driver: local
  rag_uploads:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  jadevectordb_network:
    driver: bridge