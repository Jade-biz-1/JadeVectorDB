global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'jadevectordb'
    static_configs:
      - targets: ['jadevectordb:8080']

  - job_name: 'rag-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['rag-backend:8000']

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
